<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Stands</title>
<link rel="stylesheet" href="styles.css">
<style>
.simulador{
text-align:center;
padding:40px;
}
.tallas button{
padding:10px 20px;
margin:10px;
border:none;
background:#000;
color:#fff;
cursor:pointer;
border-radius:8px;
}
</style>
</head>

<body>

<div class="simulador">
<h2>Simulador de Playeras</h2>

<div class="tallas">
<button onclick="cambiar('chica')">Chica</button>
<button onclick="cambiar('mediana')">Mediana</button>
<button onclick="cambiar('grande')">Grande</button>
</div>

<img id="playera" src="img/chica.png" width="300">

</div>

<script>
function cambiar(talla){
document.getElementById("playera").src="img/"+talla+".png";
}
</script>

</body>
</html>
